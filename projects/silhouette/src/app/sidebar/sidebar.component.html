<div class="overlay" *ngIf="isOpen" [@overlayFade] (click)="close()" aria-hidden="true"></div>
<aside class="sidebar" *ngIf="isOpen" [@sidebarSlide]>
  <!-- Watermark -->
  <div class="watermark"><img src="assets/logo-mark.svg" alt="Silhouette watermark" /></div>

  <header class="sidebar-header">
    <nav class="tabs">
      <button class="tab" [class.active]="activeTab==='shop'" (click)="switchTab('shop')">SHOP</button>
      <button class="tab" [class.active]="activeTab==='explore'" (click)="switchTab('explore')">EXPLORE</button>
    </nav>
    <button class="close-btn" (click)="close()" aria-label="Close menu">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </header>

  <section class="content">
    <!-- SHOP Tab -->
    <ng-container *ngIf="activeTab==='shop'">
      <ul class="menu-list shop-categories">
        <li class="item category-item"><a>ALL PRODUCTS</a></li>
        <li class="item category-item"><a>NEW ARRIVALS</a></li>
        <li class="item category-item has-gap"></li>
        <li class="item category-item"><a>SLEEPWEAR</a></li>
        <li class="item category-item"><a>GYMWEAR</a></li>
        <li class="item category-item"><a>INNERWEAR</a></li>
        <li class="item category-item"><a>MATERNITY WEAR</a></li>
        <li class="item category-item"><a>MEDICAL SCRUBS</a></li>
        <li class="item category-item"><a>BEDSPREAD &amp; DUVETS</a></li>
      </ul>

      <!-- Divider + Account Section -->
      <div class="account-section">
        <div class="divider"></div>
        <ul class="menu-list account-list">
          <li class="item account-item"><a>My Account</a></li>
          <li class="item account-item"><a>Wishlist</a></li>
          <li class="item account-item"><a>My Cart</a></li>
        </ul>
      </div>

      <!-- Social Icons -->
      <div class="social-row">
        <!-- Instagram -->
        <a class="social-link" aria-label="Instagram" href="https://instagram.com" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <circle cx="12" cy="12" r="5"></circle>
            <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"></circle>
          </svg>
        </a>
        <!-- TikTok -->
        <a class="social-link" aria-label="TikTok" href="https://tiktok.com" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M16.6 5.82s.51.5 0 0A4.278 4.278 0 0 1 15.54 3h-3.09v12.4a2.592 2.592 0 0 1-2.59 2.5c-1.42 0-2.6-1.16-2.6-2.6 0-1.72 1.66-3.01 3.37-2.48V9.66c-3.45-.46-6.47 2.22-6.47 5.64 0 3.33 2.76 5.7 5.69 5.7 3.14 0 5.69-2.55 5.69-5.7V9.01a7.35 7.35 0 0 0 4.3 1.38V7.3s-1.88.09-3.24-1.48z"/>
          </svg>
        </a>
        <!-- Facebook -->
        <a class="social-link" aria-label="Facebook" href="https://facebook.com" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
        </a>
        <!-- WhatsApp -->
        <a class="social-link" aria-label="WhatsApp" href="https://wa.me/" target="_blank" rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
          </svg>
        </a>
      </div>
    </ng-container>

    <!-- EXPLORE Tab -->
    <ng-container *ngIf="activeTab==='explore'">
      <ul class="menu-list explore-list">
        <li class="item category-item"><a>SS26 LOOKBOOK</a></li>
        <li class="item category-item"><a>OFFERS</a></li>
        <li class="item category-item"><a>PACKAGE DEALS</a></li>
        <li class="item category-item"><a>DELIVERY DETAILS</a></li>
      </ul>
    </ng-container>
  </section>

  <!-- Copyright Footer -->
  <footer class="sidebar-footer">
    <span class="copyright-text">&copy; {{ currentYear }} Silhouette</span>
  </footer>
</aside>
